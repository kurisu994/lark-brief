{% extends "base.html" %}
{% block title %}Server Error — Lark Brief{% endblock %}

{% block content %}
<div class="flex flex-col items-center justify-center py-24 text-center">
  <div class="inline-flex items-center justify-center w-16 h-16 rounded-full bg-red-50 dark:bg-red-900/20 mb-6">
    <i data-lucide="alert-triangle" class="w-8 h-8 text-red-400"></i>
  </div>
  <h1 class="text-4xl font-bold text-slate-900 dark:text-slate-100">500</h1>
  <p class="text-slate-500 dark:text-slate-400 mt-2 text-base">Something went wrong on our end.</p>
  <a href="/"
     class="mt-6 inline-flex items-center gap-1.5 text-sm font-medium text-accent hover:underline">
    <i data-lucide="arrow-left" class="w-3.5 h-3.5"></i>
    Back to dashboard
  </a>
</div>
{% endblock %}

{% block scripts %}
<script>lucide.createIcons();</script>
{% endblock %}
