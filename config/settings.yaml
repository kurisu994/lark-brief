network:
  proxy: "" # 支持 http:// 或 socks5://，为空则禁用全局代理
  enable_for_crawler: true          # 爬取时是否使用代理
  enable_for_llm: false             # 请求 LLM 时是否使用代理
  enable_for_pusher: false          # 推送时是否使用代理

llm:
  base_url: https://ark.cn-beijing.volces.com/api/v3
  model: "deepseek-v3-2-251201"
  temperature: 0.7
  top_p: 0.95
  max_tokens: 4096
  timeout: 600
  query_timeout: 600 # 单次查询/对话的总超时（秒）
  reasoning_effort: "medium" # doubao系列特有的参数，分为 minimal、low、medium、high 四种模式，其中minimal为不思考
  # api_key 通过环境变量 ARK_API_KEY 读取

feed:
  timeout: 45              # RSS Feed HTTP 请求超时（秒）
  max_entries: 20           # 每个 Feed 最大条目数

crawler:
  headless: true
  filter_threshold: 0.45  # PruningContentFilter 阈值
  page_timeout: 90000     # 页面加载超时（毫秒），默认 60000
  retry_count: 1          # 失败源重试次数
  select_count: 15        # 每次随机选取的资讯源数量（0 表示全部爬取）

output:
  dir: output
  filename_format: "{date}.md"

brief:
  max_items: 20
  min_items: 10

schedule:
  generate_cron: "30 8 * * *" # 每天 8:30 抓取数据并生成报告
  push_cron: "0 9 * * *"      # 每天 9:00 发送当天报告通知
  timezone: "Asia/Shanghai"

store:
  db_path: "data/lark-brief.db"
  max_db_size_mb: 500        # SQLite 文件大小上限（MB）

alert:
  enabled: true
  min_success_rate: 0.5     # 爬取成功率低于此值时推送告警

pushers:
  dingtalk:
    enabled: true
    webhook_url: https://oapi.dingtalk.com/robot/send
    # access_token 通过环境变量 D_ACCESS_TOKEN 读取
    # secret 通过环境变量 D_SECRET 读取
  feishu:
    enabled: true
    webhook_url: https://open.feishu.cn/open-apis/bot/v2/hook
    # access_token 通过环境变量 FS_ACCESS_TOKEN 读取
    # secret 通过环境变量 FS_SECRET 读取
