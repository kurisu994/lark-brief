services:
  # 后端服务（FastAPI API + 定时调度，合并为单进程）
  backend:
    build: .
    container_name: lark-brief-backend
    command: ["--web"]
    expose:
      - "8080"
    environment:
      - ARK_API_KEY=${ARK_API_KEY}
      - D_SECRET=${D_SECRET}
      - D_ACCESS_TOKEN=${D_ACCESS_TOKEN}
      - FS_SECRET=${FS_SECRET}
      - FS_ACCESS_TOKEN=${FS_ACCESS_TOKEN}
    volumes:
      - ./config:/app/config:ro
      - ./output:/app/output
      - lark-brief-data:/app/data
    restart: unless-stopped

  # 前端（Next.js + HeroUI）
  web:
    build: ./frontend
    container_name: lark-brief-web
    ports:
      - "9090:3000"
    environment:
      - BACKEND_URL=http://backend:8080
    restart: unless-stopped
    depends_on:
      - backend

volumes:
  lark-brief-data:
