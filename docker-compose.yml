services:
  lark-brief:
    build: .
    container_name: lark-brief
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config:/app/config:ro
      - ./output:/app/output
      - lark-brief-data:/app/data
    # 默认定时调度模式；单次运行可用:
    # docker compose run --rm lark-brief --once
    # command: ["--once"]

volumes:
  lark-brief-data:
