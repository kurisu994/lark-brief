<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient for the app icon container -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="50%" stop-color="#6D28D9" />
      <stop offset="100%" stop-color="#4C1D95" />
    </linearGradient>
    
    <!-- Wing Gradient 1 (Glassmorphism effect) -->
    <linearGradient id="wing-grad-1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.95" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.3" />
    </linearGradient>
    
    <!-- Wing Gradient 2 -->
    <linearGradient id="wing-grad-2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="0.75" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.15" />
    </linearGradient>

    <!-- Wing Gradient 3 -->
    <linearGradient id="wing-grad-3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" stop-opacity="1.0" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.6" />
    </linearGradient>

    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="16" stdDeviation="24" flood-color="#4C1D95" flood-opacity="0.6"/>
    </filter>
    
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.25"/>
    </filter>
  </defs>
  
  <!-- Outer container with fully transparent bounding box -->
  <rect x="0" y="0" width="512" height="512" fill="none" />
  
  <!-- Icon base shape (rounded squircle) -->
  <rect x="48" y="48" width="416" height="416" rx="100" fill="url(#bg-grad)" filter="url(#shadow)" />
  
  <!-- Inner ring / subtle highlight -->
  <rect x="48" y="48" width="416" height="416" rx="100" fill="none" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="2" />
  
  <!-- Abstract Lark Bird / Paper plane geometry -->
  <g transform="translate(140, 150)" filter="url(#glow)">
    <!-- Right sweeping wing -->
    <path d="M50 160 L220 0 L250 40 L120 230 Z" fill="url(#wing-grad-1)" />
    <!-- Left sharp wing -->
    <path d="M50 160 L120 60 L80 230 Z" fill="url(#wing-grad-2)" />
    <!-- Center diamond (newspaper/brief concept) -->
    <path d="M120 230 L180 180 L250 40 Z" fill="url(#wing-grad-3)" />
  </g>
</svg>
